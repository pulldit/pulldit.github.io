<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="500" viewBox="0 0 1360 500" role="img" aria-label="Pulldit — download Reddit media in your browser">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0f14"/>
      <stop offset="1" stop-color="#121822"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="-0.05" r="0.75">
      <stop offset="0" stop-color="#ff5414" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ff5414" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff5414"/>
      <stop offset="0.55" stop-color="#ff8c1a"/>
      <stop offset="1" stop-color="#ffd08a"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffe7d4"/>
    </linearGradient>
    <linearGradient id="wm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff7a1a"/>
      <stop offset="1" stop-color="#ffae5c"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1360" height="500" fill="url(#bg)"/>
  <rect width="1360" height="500" fill="url(#glow)"/>

  <!-- LEFT: hexagon badge with the download mark, vertically centred -->
  <polygon points="100,153 200,153 250,240 200,327 100,327 50,240"
           fill="#141b24" stroke="url(#ring)" stroke-width="7" stroke-linejoin="round"/>
  <g transform="translate(70,155) scale(2.5)" fill="url(#arrow)">
    <rect x="27" y="13" width="10" height="18" rx="2.5"/>
    <path d="M16.5 27 H47.5 a1.6 1.6 0 0 1 1.2 2.65 L33.4 46.6 a2 2 0 0 1 -2.8 0 L15.3 29.65 A1.6 1.6 0 0 1 16.5 27 Z"/>
    <rect x="16" y="49" width="32" height="6" rx="3"/>
  </g>

  <!-- RIGHT: 9-tile media-grid motif, vertically centred on the same axis -->
  <g opacity="0.08" fill="#ffffff">
    <rect x="1104" y="142" width="58" height="58" rx="10"/>
    <rect x="1173" y="142" width="58" height="58" rx="10"/>
    <rect x="1242" y="142" width="58" height="58" rx="10"/>
    <rect x="1104" y="211" width="58" height="58" rx="10"/>
    <rect x="1173" y="211" width="58" height="58" rx="10"/>
    <rect x="1242" y="211" width="58" height="58" rx="10"/>
    <rect x="1104" y="280" width="58" height="58" rx="10"/>
    <rect x="1173" y="280" width="58" height="58" rx="10"/>
    <rect x="1242" y="280" width="58" height="58" rx="10"/>
  </g>
  <g opacity="0.16" fill="#ff8c1a">
    <rect x="1197" y="223" width="10" height="14" rx="2.5"/>
    <polygon points="1188,235 1216,235 1202,252"/>
    <rect x="1190" y="256" width="24" height="5" rx="2.5"/>
  </g>

  <!-- CENTRE: left-aligned text block, positioned in the middle gap -->
  <text x="380" y="240" font-family="ui-monospace, 'DejaVu Sans Mono', 'Liberation Mono', Consolas, monospace" font-size="108" font-weight="700" fill="#f3f4f6">Pull<tspan fill="url(#wm)">dit</tspan></text>
  <rect x="380" y="265" width="38" height="6" rx="3" fill="#ff7a1a"/>
  <text x="432" y="276" font-family="ui-monospace, 'DejaVu Sans Mono', 'Liberation Mono', Consolas, monospace" font-size="25" fill="#9aa7b4">download reddit media in your browser</text>
  <text x="380" y="320" font-family="ui-monospace, 'DejaVu Sans Mono', 'Liberation Mono', Consolas, monospace" font-size="24" fill="#6f7b8a">Images · GIFs · Videos · Galleries · ZIP</text>

  <!-- footer -->
  <line x1="60" y1="430" x2="1300" y2="430" stroke="#232c38" stroke-width="2"/>
  <text x="60" y="470" font-family="ui-monospace, 'DejaVu Sans Mono', 'Liberation Mono', Consolas, monospace" font-size="24" fill="#6f7b8a">pulldit.github.io</text>
  <text x="1300" y="470" text-anchor="end" font-family="ui-monospace, 'DejaVu Sans Mono', 'Liberation Mono', Consolas, monospace" font-size="24" fill="#6f7b8a">static · no backend · no tracking</text>
</svg>
